kind = "web"
previewPath = "/"
title = "EchoLens Dashboard"
version = "1.0.0"
id = "artifacts/echolens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20867

[services.development]
run = "pnpm --filter @workspace/echolens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echolens", "run", "build" ]
publicDir = "artifacts/echolens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20867"
BASE_PATH = "/"
